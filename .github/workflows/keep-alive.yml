name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * 0,3'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase plaques table
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/plaques?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
