name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * 0,3'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase plaques table
        run: |
          curl -X GET "${{ secrets.https://wegnknkebcguglkmxlxx.supabase.co }}/rest/v1/plaques?select=id&limit=1" \
            -H "apikey: ${{ secrets.sb_publishable_RrghKX1FabZeGf7WaKZI1g_zUe7jodL }}" \
            -H "Authorization: Bearer ${{ sb_publishable_RrghKX1FabZeGf7WaKZI1g_zUe7jodL }}"
